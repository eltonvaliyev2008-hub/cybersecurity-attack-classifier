<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberShield AI — Hücum Təsnifatı</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red:       #ff0033;
    --red-dim:   #cc0022;
    --red-glow:  rgba(255,0,51,0.3);
    --green:     #00ff88;
    --green-dim: #00cc66;
    --green-glow:rgba(0,255,136,0.25);
    --amber:     #ffaa00;
    --bg:        #020608;
    --bg2:       #060d10;
    --bg3:       #0a1520;
    --panel:     rgba(6,20,30,0.85);
    --border:    rgba(0,255,136,0.15);
    --border-r:  rgba(255,0,51,0.3);
    --text:      #c8e8d8;
    --text-dim:  #5a8870;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* ── MATRIX CANVAS ── */
  #matrix-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.07;
    pointer-events: none;
    z-index: 0;
  }

  /* ── SCAN LINE ── */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    animation: scanline 4s linear infinite;
    z-index: 999;
    pointer-events: none;
  }
  @keyframes scanline {
    0%  { top: 0; opacity: 1; }
    100%{ top: 100vh; opacity: 0.3; }
  }

  /* ── GRID OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── WRAPPER ── */
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  /* ── HEADER ── */
  header {
    padding: 40px 0 30px;
    text-align: center;
    position: relative;
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 10px;
  }

  .logo-icon {
    width: 48px; height: 48px;
    border: 2px solid var(--green);
    display: grid;
    place-items: center;
    clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    background: rgba(0,255,136,0.08);
    animation: pulse-icon 2s ease-in-out infinite;
  }
  .logo-icon svg { width: 24px; height: 24px; fill: var(--green); }

  @keyframes pulse-icon {
    0%,100%{ box-shadow: 0 0 10px var(--green-glow); }
    50%    { box-shadow: 0 0 25px var(--green-glow), 0 0 50px var(--green-glow); }
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 900;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, var(--green) 0%, #00ccff 50%, var(--green) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-size: 200% auto;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer {
    0%  { background-position: 0% center; }
    100%{ background-position: 200% center; }
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    color: var(--text-dim);
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    margin-top: 6px;
  }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-top: 18px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 1.5s step-end infinite;
  }
  .dot.red { background: var(--red); }
  @keyframes blink {
    0%,100%{ opacity: 1; }
    50%    { opacity: 0; }
  }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green-dim), transparent);
    margin: 10px 0 32px;
    position: relative;
  }
  .divider::before {
    content: '◆';
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%,-50%);
    color: var(--green);
    font-size: 0.6rem;
    background: var(--bg);
    padding: 0 8px;
  }

  /* ── MAIN GRID ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media(max-width:700px){ .main-grid { grid-template-columns: 1fr; } }

  /* ── PANEL ── */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 24px;
    position: relative;
    backdrop-filter: blur(10px);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .panel:hover {
    border-color: rgba(0,255,136,0.35);
    box-shadow: 0 0 30px rgba(0,255,136,0.06), inset 0 0 20px rgba(0,255,136,0.03);
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--green), transparent);
  }

  .panel-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--green);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── FORM FIELDS ── */
  .field {
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-bottom: 5px;
  }

  input, select {
    width: 100%;
    background: rgba(0,10,15,0.8);
    border: 1px solid rgba(0,255,136,0.15);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus {
    border-color: var(--green);
    box-shadow: 0 0 12px rgba(0,255,136,0.15), inset 0 0 8px rgba(0,255,136,0.05);
    background: rgba(0,20,15,0.9);
  }

  input::placeholder { color: rgba(0,255,136,0.2); }

  select option {
    background: #060d10;
    color: var(--green);
  }

  /* ── SELECT WRAPPER ── */
  .select-wrap {
    position: relative;
  }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--green);
    pointer-events: none;
    font-size: 0.8rem;
  }

  /* ── 2-COL FIELDS ── */
  .fields-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* ── BUTTON ── */
  .btn-analyze {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.3s;
  }

  .btn-analyze::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: var(--green);
    transition: left 0.35s ease;
    z-index: -1;
  }

  .btn-analyze:hover {
    color: var(--bg);
  }
  .btn-analyze:hover::before { left: 0; }

  .btn-analyze:active { transform: scale(0.98); }

  .btn-analyze.loading {
    pointer-events: none;
    opacity: 0.7;
  }

  /* ── RESULT PANEL ── */
  .result-panel {
    grid-column: 1 / -1;
    display: none;
    background: var(--panel);
    border: 1px solid var(--border-r);
    padding: 28px;
    backdrop-filter: blur(10px);
    animation: fadeIn 0.5s ease;
    position: relative;
  }
  .result-panel.show { display: block; }
  .result-panel.safe { border-color: var(--border); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--red);
  }
  .result-panel.safe::before { background: var(--green); }

  .result-inner {
    display: flex;
    align-items: center;
    gap: 32px;
    flex-wrap: wrap;
  }

  .threat-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-width: 120px;
  }

  .threat-icon {
    width: 64px; height: 64px;
    border: 2px solid var(--red);
    display: grid;
    place-items: center;
    clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    background: rgba(255,0,51,0.08);
    animation: threat-pulse 1.5s ease-in-out infinite;
    font-size: 1.6rem;
  }
  .threat-icon.safe-icon {
    border-color: var(--green);
    background: rgba(0,255,136,0.08);
    animation: safe-pulse 2s ease-in-out infinite;
  }

  @keyframes threat-pulse {
    0%,100%{ box-shadow: 0 0 10px var(--red-glow); }
    50%    { box-shadow: 0 0 30px var(--red-glow), 0 0 60px var(--red-glow); }
  }
  @keyframes safe-pulse {
    0%,100%{ box-shadow: 0 0 10px var(--green-glow); }
    50%    { box-shadow: 0 0 25px var(--green-glow); }
  }

  .threat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .result-details { flex: 1; }

  .result-type {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    font-weight: 700;
    color: var(--red);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .result-type.safe-type { color: var(--green); }

  .result-prob {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .prob-bar-wrap {
    background: rgba(255,255,255,0.05);
    height: 4px;
    width: 100%;
    max-width: 300px;
    margin-bottom: 16px;
  }

  .prob-bar {
    height: 100%;
    background: var(--red);
    width: 0%;
    transition: width 1s ease;
    box-shadow: 0 0 8px var(--red-glow);
  }
  .prob-bar.safe-bar {
    background: var(--green);
    box-shadow: 0 0 8px var(--green-glow);
  }

  .result-desc {
    font-size: 0.82rem;
    color: var(--text-dim);
    line-height: 1.6;
    max-width: 500px;
  }

  /* ── INFO CARDS ── */
  .info-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 20px;
  }
  @media(max-width:600px){ .info-row { grid-template-columns: 1fr; } }

  .info-card {
    background: rgba(0,10,15,0.6);
    border: 1px solid var(--border);
    padding: 16px;
    text-align: center;
    transition: border-color 0.3s, transform 0.3s;
  }
  .info-card:hover {
    border-color: rgba(0,255,136,0.3);
    transform: translateY(-2px);
  }

  .info-val {
    font-family: 'Orbitron', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 4px;
  }

  .info-lbl {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  /* ── FOOTER ── */
  footer {
    margin-top: 48px;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }

  /* ── LOADING SPINNER ── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(0,255,136,0.2);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── GLITCH TEXT ── */
  .glitch {
    position: relative;
  }
  .glitch::before, .glitch::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    background: transparent;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .glitch::before {
    background: linear-gradient(135deg, #ff0033, #ff0033);
    -webkit-background-clip: text;
    clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
    transform: translateX(-2px);
    animation: glitch1 4s infinite;
  }
  .glitch::after {
    background: linear-gradient(135deg, #00ff88, #00ff88);
    -webkit-background-clip: text;
    clip-path: polygon(0 55%, 100% 55%, 100% 75%, 0 75%);
    transform: translateX(2px);
    animation: glitch2 4s infinite;
  }
  @keyframes glitch1 {
    0%,90%,100%{ transform: translateX(0); opacity:0; }
    92%        { transform: translateX(-3px); opacity:0.8; }
    94%        { transform: translateX(3px); opacity:0.8; }
    96%        { transform: translateX(0); opacity:0; }
  }
  @keyframes glitch2 {
    0%,90%,100%{ transform: translateX(0); opacity:0; }
    93%        { transform: translateX(3px); opacity:0.8; }
    95%        { transform: translateX(-3px); opacity:0.8; }
    97%        { transform: translateX(0); opacity:0; }
  }
</style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="logo-line">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l6 2.67V11c0 3.88-2.67 7.52-6 8.93C8.67 18.52 6 14.88 6 11V7.67L12 5z"/></svg>
      </div>
      <h1 class="glitch" data-text="CYBERSHIELD AI">CYBERSHIELD AI</h1>
    </div>
    <div class="subtitle">ŞƏBƏKƏ HÜCUM TƏSNİFAT SİSTEMİ</div>
    <div class="status-bar">
      <div class="status-item"><span class="dot"></span> SİSTEM AKTİVDİR</div>
      <div class="status-item"><span class="dot red"></span> TƏHLÜKƏSİZLİK MONİTORİNQİ</div>
    </div>

  </header>

  <div class="divider"></div>

  <!-- INFO CARDS -->
  <div class="info-row" style="margin-bottom:24px; grid-template-columns: 1fr;">
    <div class="info-card">
      <div class="info-val">99.99%</div>
      <div class="info-lbl">MODEL DƏQİQLİYİ</div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-grid">

    <!-- LEFT PANEL: Şəbəkə parametrləri -->
    <div class="panel">
      <div class="panel-title">◈ ŞƏBƏKƏ PARAMETRLƏRİ</div>

      <div class="fields-2">
        <div class="field">
          <label>PAKET ÖLÇÜsü (byte)</label>
          <input type="number" id="paket_olcusu" placeholder="64 – 65532" min="64" max="65532">
        </div>
        <div class="field">
          <label>PAKET SAYI</label>
          <input type="number" id="paket_sayi" placeholder="1 – 49994" min="1" max="49994">
        </div>
        <div class="field">
          <label>BAĞLANTI MÜDDƏTİ (sn)</label>
          <input type="number" id="baglanti_muddeti" placeholder="0.001 – 7199" step="0.001" min="0.001">
        </div>
        <div class="field">
          <label>PORT NÖMRƏSİ</label>
          <input type="number" id="port_nomresi" placeholder="21 – 65517" min="21" max="65517">
        </div>
        <div class="field">
          <label>XƏTA SAYI</label>
          <input type="number" id="xeta_sayi" placeholder="0 – 199" min="0" max="199">
        </div>
        <div class="field">
          <label>GİRİŞ CƏHDİ</label>
          <input type="number" id="giris_cehdi" placeholder="1 – 499" min="1" max="499">
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL: Sistem + Cihaz -->
    <div class="panel">
      <div class="panel-title">◈ SİSTEM & CİHAZ MƏLUMATLARİ</div>

      <div class="fields-2">
        <div class="field">
          <label>CPU İSTİFADƏSİ (%)</label>
          <input type="number" id="cpu" placeholder="5 – 100" min="5" max="100" step="0.1">
        </div>
        <div class="field">
          <label>RAM İSTİFADƏSİ (%)</label>
          <input type="number" id="ram" placeholder="10 – 99" min="10" max="99" step="0.1">
        </div>
        <div class="field">
          <label>ŞƏBƏKƏ SÜRƏTİ (Mbps)</label>
          <input type="number" id="sebeke_sureti" placeholder="0.1 – 999.9" step="0.01" min="0.1">
        </div>
        <div class="field">
          <label>AKTİV SESSİYA</label>
          <input type="number" id="aktiv_sessiya" placeholder="1 – 1999" min="1" max="1999">
        </div>
      </div>

      <div class="field">
        <label>PROTOKOL</label>
        <div class="select-wrap">
          <select id="protokol">
            <option value="">— Seçin —</option>
            <option>HTTP</option>
            <option>HTTPS</option>
            <option>TCP</option>
            <option>UDP</option>
          </select>
        </div>
      </div>

      <div class="fields-2">
        <div class="field">
          <label>CİHAZ NÖVÜ</label>
          <div class="select-wrap">
            <select id="cihaz">
              <option value="">— Seçin —</option>
              <option>Android</option>
              <option>iOS</option>
              <option>Linux</option>
              <option>MacOS</option>
              <option>Windows</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>ŞƏBƏKƏ NÖVÜ</label>
          <div class="select-wrap">
            <select id="sebeke">
              <option value="">— Seçin —</option>
              <option>Ethernet</option>
              <option>Mobile</option>
              <option>VPN</option>
              <option>WiFi</option>
            </select>
          </div>
        </div>
      </div>

      <div class="field">
        <label>ŞƏHƏR</label>
        <div class="select-wrap">
          <select id="seher">
            <option value="">— Seçin —</option>
            <option>Bakı</option>
            <option>Gəncə</option>
            <option>Lənkəran</option>
            <option>Mingəçevir</option>
            <option>Sumqayıt</option>
          </select>
        </div>
      </div>
    </div>

    <!-- RESULT PANEL -->
    <div class="result-panel" id="result-panel">
      <div class="panel-title" id="result-title">◈ ANALİZ NƏTİCƏSİ</div>
      <div class="result-inner">
        <div class="threat-badge">
          <div class="threat-icon" id="result-icon">⚠</div>
          <div class="threat-label" id="result-label">TƏHLÜKƏSİZLİK</div>
        </div>
        <div class="result-details">
          <div class="result-type" id="result-type">—</div>
          <div class="result-prob" id="result-prob">Ehtimal: —</div>
          <div class="prob-bar-wrap">
            <div class="prob-bar" id="prob-bar"></div>
          </div>
          <div class="result-desc" id="result-desc">—</div>
        </div>
      </div>
    </div>

  </div><!-- /main-grid -->

  <!-- ANALYZE BUTTON (outside grid, full width) -->
  <button class="btn-analyze" id="btn-analyze" onclick="analyze()">
    ▶ &nbsp; ANALİZ ET — TƏHLÜKƏNİ MÜƏYYƏN ET
  </button>

  <!-- FOOTER -->
  <footer>
    CYBERSHIELD AI &nbsp;|&nbsp; F1-MACRO: 0.9998 &nbsp;|&nbsp; ACCURACY: 0.9999
  </footer>

</div><!-- /wrapper -->

<script>
// ── MATRIX RAIN ──────────────────────────────────────────
const canvas = document.getElementById('matrix-canvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const chars  = '01アイウエオカキクケコサシスセソタチツテトナニヌネノ';
const cols   = Math.floor(window.innerWidth / 16);
const drops  = Array(cols).fill(1);

function drawMatrix() {
  ctx.fillStyle = 'rgba(2,6,8,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ff88';
  ctx.font = '13px Share Tech Mono';
  drops.forEach((y, i) => {
    const ch = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(ch, i * 16, y * 16);
    if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}
setInterval(drawMatrix, 45);

// ── DESCRIPTIONS ─────────────────────────────────────────
const descriptions = {
  "Normal"           : "Şəbəkə trafiği normal parametrlər daxilindədir. Hücum əlaməti aşkarlanmayıb. Sistem təhlükəsizdir.",
  "DDoS"             : "Distributed Denial of Service hücumu aşkarlandı! Çoxsaylı saxta bağlantı ilə server iflic edilməyə çalışılır. Dərhal blok edin.",
  "Brute Force"      : "Brute Force hücumu aşkarlandı! Şifrəni tapmaq üçün ardıcıl giriş cəhdləri müşahidə edilir. Hesabı kilitleyin.",
  "Malware"          : "Zərərli proqram (Malware) aşkarlandı! Sistem yaddaşında şübhəli aktivlik var. Karantinaya alın.",
  "Ransomware"       : "Ransomware hücumu aşkarlandı! Fayllarınız şifrələnə bilər. Şəbəkəni dərhal izolyasiya edin.",
  "SQL Injection"    : "SQL İnjeksiya cəhdi aşkarlandı! Verilənlər bazasına icazəsiz giriş cəhdi var. Sorğuları blok edin."
};

const icons = {
  "Normal"        : "✅",
  "DDoS"          : "💥",
  "Brute Force"   : "🔓",
  "Malware"       : "🦠",
  "Ransomware"    : "🔐",
  "SQL Injection" : "💉"
};

// ── ANALYZE ──────────────────────────────────────────────
async function analyze() {
  const fields = ['paket_olcusu','paket_sayi','baglanti_muddeti',
                  'port_nomresi','xeta_sayi','giris_cehdi',
                  'cpu','ram','sebeke_sureti','aktiv_sessiya',
                  'protokol','cihaz','sebeke','seher'];

  for (const f of fields) {
    const el = document.getElementById(f);
    if (!el.value) {
      el.style.borderColor = '#ff0033';
      el.focus();
      setTimeout(() => el.style.borderColor = '', 2000);
      return;
    }
  }

  const btn = document.getElementById('btn-analyze');
  btn.classList.add('loading');
  btn.innerHTML = '<span class="spinner"></span> ANALİZ EDİLİR...';

  const payload = {
    paket_olcusu      : document.getElementById('paket_olcusu').value,
    paket_sayi        : document.getElementById('paket_sayi').value,
    baglanti_muddeti  : document.getElementById('baglanti_muddeti').value,
    port_nomresi      : document.getElementById('port_nomresi').value,
    xeta_sayi         : document.getElementById('xeta_sayi').value,
    giris_cehdi       : document.getElementById('giris_cehdi').value,
    cpu               : document.getElementById('cpu').value,
    ram               : document.getElementById('ram').value,
    sebeke_sureti     : document.getElementById('sebeke_sureti').value,
    aktiv_sessiya     : document.getElementById('aktiv_sessiya').value,
    protokol          : document.getElementById('protokol').value,
    cihaz             : document.getElementById('cihaz').value,
    sebeke            : document.getElementById('sebeke').value,
    seher             : document.getElementById('seher').value,
  };

  try {
    const res  = await fetch('/predict', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify(payload)
    });
    const data = await res.json();
    showResult(data);
  } catch(e) {
    alert('Server ilə əlaqə qurulamadı. app.py işləyirmi?');
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = '▶ &nbsp; ANALİZ ET — TƏHLÜKƏNİ MÜƏYYƏN ET';
  }
}

function showResult(data) {
  const panel    = document.getElementById('result-panel');
  const isSafe   = data.proqnoz === 'Normal';

  panel.className = 'result-panel show' + (isSafe ? ' safe' : '');

  document.getElementById('result-icon').textContent = icons[data.proqnoz] || '⚠';
  document.getElementById('result-icon').className   = 'threat-icon' + (isSafe ? ' safe-icon' : '');
  document.getElementById('result-label').textContent = isSafe ? 'TƏHLÜKƏSİZ' : 'TƏHLÜKƏ';

  const typeEl = document.getElementById('result-type');
  typeEl.textContent = data.proqnoz.toUpperCase();
  typeEl.className   = 'result-type' + (isSafe ? ' safe-type' : '');

  document.getElementById('result-prob').textContent = `Ehtimal: ${data.ehtimal}%`;
  document.getElementById('result-desc').textContent = descriptions[data.proqnoz] || '';

  const bar = document.getElementById('prob-bar');
  bar.className = 'prob-bar' + (isSafe ? ' safe-bar' : '');
  setTimeout(() => bar.style.width = data.ehtimal + '%', 100);

  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
</script>
</body>
</html>
